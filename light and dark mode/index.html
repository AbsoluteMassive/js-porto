<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light to Dark mode</title>
    <link rel="stylesheet" href="style.css">
    </head>
 <body>
  <nav>
    <div>
      <a href="#">Home</a>
      <a href="#">About</a>
      <a href="/index.html">Report</a>
    </div>
    <button id="btnLightToDark">Dark Mode</button>
  </nav>
  <header>
      <h1>Do you have anything to report?</h1>
  </header>
  <form>
    <label for="Firstname">Name</label>
    <input type="text" name="Firstname" id="Firstname" placeholder="john" required>

    <label for="Surname">Surname</label>
    <input type="text" name="Surname" id="Surname" placeholder="doe" required>

    <label for="email">email</label>
    <input type="email" name="Email" id="email" placeholder="example@gmail.com" required>

    <label for="Report">Type your report here</label>
    <textarea type="text" name="Report" id="Report" ></textarea>
    <input type="submit" id="send" value="send">
  </form>
  <footer>
    <p>
      We will get in touch to solve the matter<br> 
      as soon as possible.<br>Thank you for your patience.
    </p>
  </footer>
 <script src="script.js"></script>
 </body>
</html>
